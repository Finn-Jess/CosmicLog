<div class="details-view" *ngIf="objectData">
  <nav class="back-nav">
    <a routerLink="/catalog" class="back-link">← Back to Star Catalog</a>
  </nav>

  <div class="details-glass-card">
    <div class="details-header">
      <span class="m-badge">{{ objectData.mId }}</span>
      <h1 class="glow-title">{{ objectData.name }}</h1>
      <p class="constellation-tag">Constellation: <span>{{ objectData.constellation }}</span></p>
    </div>

    <div class="spec-grid">
      <div class="spec-box">
        <label>Object Type</label>
        <span class="value">{{ objectData.type }}</span>
      </div>
      <div class="spec-box">
        <label>Apparent Magnitude</label>
        <span class="value">{{ objectData.magnitude }}</span>
      </div>
      <div class="spec-box">
        <label>Distance</label>
        <span class="value">{{ objectData.distance }}</span>
      </div>
    </div>

    <div class="info-section">
      <h2>Observation Notes</h2>
      <p>{{ objectData.description }}</p>
    </div>

    <div class="details-actions">
      <button (click)="addToLog()" class="action-btn log-btn">
        Add to My Observation Log
      </button>
    </div>
  </div>
</div>

<div class="details-view" *ngIf="!objectData">
    <h1 class="glow-title">Object Not Found</h1>
    <a routerLink="/catalog" class="back-link">Return to Catalog</a>
</div>
