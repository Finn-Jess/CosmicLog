<div class="catalog-container">
  <h1 class="glow-text">Celestial Objects</h1>
  <p class="subtitle">Discover objects from the Messier and NGC catalogs.</p>

  <div class="search-section">
    <input 
      type="text" 
      [(ngModel)]="searchTerm" 
      (input)="filterResults()" 
      placeholder="Search by name (e.g. Andromeda)..."
      class="search-bar"
    >
  </div>

  <div class="objects-grid">
    <div class="object-card" *ngFor="let obj of filteredObjects">
      <div class="card-header">
        <span>{{ obj.id | uppercase }}</span>
        <span>{{ obj.type | uppercase }}</span>
      </div>
      
      <h3>{{ obj.name }}</h3>
      <p class="constellation">{{ obj.constellation }}</p>
      
      <button class="view-btn" (click)="viewData(obj)">View Data</button>
    </div>
  </div>
</div>
